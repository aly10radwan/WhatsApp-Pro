<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-panel-bg: #111b21;
            --wa-header-bg: #202c33;
            --wa-text-main: #e9edef;
            --wa-text-sub: #8696a0;
            --wa-green: #00a884;
            --wa-input-bg: #202c33;
            --wa-border: #222e35;
            --wa-chat-area: #222e35;
            --font-size-base: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0c1317; /* لون الخلفية المحيطة بالبرنامج */
            color: var(--wa-text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: var(--font-size-base);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* حاوية التطبيق الكبيرة (شكل شاشة الكمبيوتر) */
        .app-window {
            display: flex;
            width: 100vw;
            height: 100vh;
            background-color: var(--wa-panel-bg);
            box-shadow: 0 6px 18px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        @media (min-width: 1440px) {
            .app-window {
                width: 1396px;
                height: 95vh;
                border-radius: 3px;
            }
        }

        /* ---------------------------------------------------- */
        /* الجانب الأيمن: القائمة الجانبية (شات وبحث وهيدر) */
        /* ---------------------------------------------------- */
        .side-panel {
            width: 30%;
            min-width: 340px;
            max-width: 400px;
            border-left: 1px solid var(--wa-border);
            display: flex;
            flex-direction: column;
            background-color: var(--wa-panel-bg);
        }

        .side-header {
            background-color: var(--wa-header-bg);
            height: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background-color: #005c4b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #fff;
        }

        .header-icons {
            display: flex;
            gap: 15px;
        }

        .header-icons button {
            background: none;
            border: none;
            color: var(--wa-text-sub);
            font-size: 1.2em;
            cursor: pointer;
            outline: none;
        }

        /* صندوق البحث المماثل للرسمي */
        .search-container {
            padding: 8px 12px;
            background-color: var(--wa-panel-bg);
            border-bottom: 1px solid var(--wa-border);
        }

        .search-box {
            background-color: var(--wa-input-bg);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--wa-text-main);
            width: 100%;
            outline: none;
            font-size: 0.9em;
        }

        /* قائمة الشاتات */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(34, 46, 53, 0.5);
            transition: background 0.1s;
        }

        .chat-item:hover, .chat-item.active {
            background-color: var(--wa-header-bg);
        }

        .chat-avatar {
            width: 49px;
            height: 49px;
            border-radius: 50%;
            background-color: #51595e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
        }

        .chat-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }

        .chat-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title-row h3 {
            margin: 0;
            font-size: 1em;
            font-weight: normal;
        }

        .chat-time {
            font-size: 0.75em;
            color: var(--wa-text-sub);
        }

        .chat-preview {
            font-size: 0.85em;
            color: var(--wa-text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---------------------------------------------------- */
        /* الجانب الأيسر الكبيير: شاشة الترحيب أو الإعدادات */
        /* ---------------------------------------------------- */
        .main-view {
            flex: 1;
            background-color: #222e35; /* لون مساحة الشات الكبيرة */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* شاشة الترحيب الرسمية للواتساب ويب */
        .welcome-screen {
            text-align: center;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-logo {
            font-size: 6em;
            color: #51595e;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .welcome-screen h1 {
            font-size: 2em;
            font-weight: 300;
            margin: 10px 0;
            color: var(--wa-text-main);
        }

        .welcome-screen p {
            font-size: 0.9em;
            color: var(--wa-text-sub);
            line-height: 1.6;
        }

        .encrypted-footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.85em;
            color: var(--wa-text-sub);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* لوحة الإعدادات الرسمية الصافية */
        .settings-screen {
            width: 100%;
            height: 100%;
            background-color: #1f2c34;
            display: none;
            flex-direction: column;
        }

        .settings-header {
            background-color: var(--wa-header-bg);
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.1em;
        }

        .back-arrow {
            background: none;
            border: none;
            color: var(--wa-text-main);
            font-size: 1.4em;
            cursor: pointer;
            outline: none;
        }

        .settings-body {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            max-width: 600px;
        }

        .settings-group {
            margin-bottom: 25px;
        }

        .settings-group label {
            display: block;
            color: var(--wa-green);
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: var(--wa-panel-bg);
            color: var(--wa-text-main);
            border: 1px solid var(--wa-border);
            border-radius: 5px;
            font-size: 1em;
