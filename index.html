<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-panel-bg: #111b21;
            --wa-header-bg: #202c33;
            --wa-text-main: #e9edef;
            --wa-text-sub: #8696a0;
            --wa-green: #00a884;
            --wa-input-bg: #2a3942;
            --wa-border: #222e35;
            --font-size-base: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--wa-bg);
            color: var(--wa-text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: var(--font-size-base);
            box-sizing: border-box;
        }

        /* حاوية التطبيق الرئيسية تشبه شاشة الواتساب تماماً */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--wa-panel-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 500px) {
            .app-container {
                height: 85vh;
                border-radius: 10px;
            }
        }

        /* الهيدر العلوي الرسمي للواتساب */
        .main-header {
            background-color: var(--wa-header-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--wa-border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #667781;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #fff;
        }

        .status-text {
            font-size: 0.9em;
            font-weight: bold;
        }

        .online-dot {
            color: var(--wa-green);
            font-size: 0.8em;
        }

        .header-actions button {
            background: none;
            border: none;
            color: var(--wa-text-sub);
            font-size: 1.2em;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* قائمة الشاتات الوهمية لإعطاء المظهر الرسمي */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--wa-border);
        }

        .chat-item:hover {
            background-color: var(--wa-header-bg);
        }

        .chat-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-name-time {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-name {
            font-weight: 500;
        }

        .chat-time {
            font-size: 0.75em;
            color: var(--wa-text-sub);
        }

        .chat-msg {
            font-size: 0.85em;
            color: var(--wa-text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* لوحة الإعدادات الرسمية (تفتح كـ Sidebar جانبي كالويندوز والويب) */
        .settings-panel {
            position: absolute;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background-color: var(--wa-panel-bg);
            transition: right 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            z-index: 200;
        }

        .settings-panel.active {
            right: 0;
        }

        .settings-header {
            background-color: var(--wa-header-bg);
            color: var(--wa-text-main);
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--wa-green);
            font-size: 1.3em;
            cursor: pointer;
        }

        .settings-options {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .setting-row {
            padding: 16px 24px;
            border-bottom: 1px solid var(--wa-border);
        }

        .setting-row label {
            display: block;
            color: var(--wa-text-sub);
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: var(--wa-input-bg);
            color: var(--wa-text-main);
            border: 1px solid var(--wa-border);
            border-radius: 6px;
            font-size: 1em;
            outline: none;
            cursor: pointer;
        }

        /* شاشة قفل الواتساب الرسمية للباسورد السريع */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--wa-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
            box-sizing: border-box;
        }

        .lock-icon {
            font-size: 3.5em;
            color: var(--wa-green);
            margin-bottom: 10px;
        }

        #login-pin {
            width: 100%;
            max-width: 280px;
            padding: 12px;
            background-color: var(--wa-input-bg);
            color: var(--wa-text-main);
            border: 1px solid transparent;
            border-radius: 6px;
            text-align: center;
            font-size: 1.2em;
            letter-spacing: 4px;
            outline: none;
        }

        #login-pin:focus {
            border-color: var(--wa-green);
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="lock-icon">🔒</div>
        <h2 style="margin-bottom: 8px; font-weight: normal;">واتساب محمي</h2>
        <p style="color: var(--wa-text-sub); font-size: 14px; margin-bottom: 20px;">أدخل كلمة المرور لفتح التطبيق</p>
        <input type="password" id="login-pin" placeholder="••••" oninput="checkLogin()">
        <p style="color: var(--wa-text-sub); font-size: 11px; margin-top: 12px;">الرمز الافتراضي: 1234 (أو كود الطوارئ)</p>
    </div>

    <div class="app-container" id="main-app" style="display: none;">
        
        <div class="main-header">
            <div class="user-info">
                <div class="avatar">A</div>
                <div class="status-text">WhatsApp Pro <span class="online-dot">🟢</span></div>
            </div>
            <div class="header-actions">
                <button onclick="toggleSettings(true)" title="الإعدادات">⚙️</button>
            </div>
        </div>

        <div class="chat-list">
            <div class="chat-item">
                <div class="avatar" style="background-color: #005c4b;">م</div>
                <div class="chat-details">
                    <div class="chat-name-time">
                        <span class="chat-name">مشاريع علي الفخمة 🚀</span>
                        <span class="chat-time">الآن</span>
                    </div>
                    <div class="chat-msg">التطبيق شغال رسمي 100% وبأعلى كفاءة...</div>
                </div>
            </div>
            <div class="chat-item" onclick="toggleSettings(true)">
                <div class="avatar" style="background-color: #202c33;">⚙️</div>
                <div class="chat-details">
                    <div class="chat-name-time">
                        <span class="chat-name">إعدادات المظهر والخط</span>
                        <span class="chat-time">أمس</span>
                    </div>
                    <div class="chat-msg">اضغط هنا لتعديل ألوان الشاشة وحجم الخط...</div>
                </div>
            </div>
        </div>

        <div class="settings-panel" id="settings-side-panel">
            <div class="settings-header">
                <button class="back-btn" onclick="toggleSettings(false)">➔</button>
                <span>الإعدادات</span>
            </div>
            
            <div class="settings-options">
                <div class="setting-row">
                    <label>المظهر (Theme):</label>
                    <select id="theme-select" onchange="changeTheme()">
                        <option value="dark">الوضع الداكن (WhatsApp Dark)</option>
                        <option value="light">الوضع الفاتح (WhatsApp Light)</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label>حجم الخط (Font Size):</label>
                    <select id="font-size-select" onchange="changeFontSize()">
                        <option value="16px">افتراضي (متوسط)</option>
                        <option value="14px">صغير</option>
                        <option value="19px">كبير</option>
                        <option value="22px">كبير جداً</option>
                    </select>
                </div>

                <div class="setting-row" style="background-color: rgba(234, 0, 56, 0.05);">
                    <label style="color: #ea0038; font-weight: bold;">🚨 رمز الطوارئ الفوري (Panic Code):</label>
                    <input type="password" id="panic-code-input" placeholder="اكتب رمز التدمير الذاتي هنا" style="width:100%; padding:12px; background:var(--wa-input-bg); border:1px solid var(--wa-border); color:#fff; border-radius:6px; box-sizing:border-box;">
                    <button onclick="savePanicCode()" style="width:100%; padding:10px; background:#ea0038; color:#fff; border:none; border-radius:6px; font-weight:bold; margin-top:10px; cursor:pointer;">حفظ وتثبيت الرمز</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let appPassword = "1234"; // الرقم السري للدخول

        // فحص كلمة السر تلقائياً بدون زرار
        function checkLogin() {
            let inputPin = document.getElementById('login-pin').value;
            let savedPanic = localStorage.getItem('panicCode');

            // 1. فحص كود الطوارئ للتدمير الذاتي للمعلومات
            if (savedPanic && inputPin === savedPanic) {
                localStorage.clear();
                alert("🚨 تم تفعيل نظام الطوارئ! تم مسح كافة البيانات والإعدادات فوراً.");
                location.reload();
                return;
            }

            // 2. الدخول العادي بالرقم السري
            if (inputPin === appPassword) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                loadSettings();
            }
        }

        // فتح وإغلاق لوحة الإعدادات الجانبية
        function toggleSettings(show) {
            let panel = document.getElementById('settings-side-panel');
            if (show) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        }

        // حفظ كود الطوارئ
        function savePanicCode() {
            let code = document.getElementById('panic-code-input').value.trim();
            if(code) {
                localStorage.setItem('panicCode', code);
                alert("🔒 تم حفظ وتثبيت كود الطوارئ بنجاح.");
            } else {
                alert("يرجى كتابة رمز أولاً!");
            }
        }

        // تغيير الثيم (الألوان الرسمية لواتساب ويب)
        function changeTheme() {
            let theme = document.getElementById('theme-select').value;
            localStorage.setItem('appTheme', theme);
            applyTheme(theme);
        }

        function applyTheme(theme) {
            if (theme === 'light') {
                document.documentElement.style.setProperty('--wa-bg', '#eae6df');
                document.documentElement.style.setProperty('--wa-panel-bg', '#ffffff');
                document.documentElement.style.setProperty('--wa-header-bg', '#f0f2f5');
                document.documentElement.style.setProperty('--wa-text-main', '#111b21');
                document.documentElement.style.setProperty('--wa-text-sub', '#667781');
                document.documentElement.style.setProperty('--wa-input-bg', '#f0f2f5');
                document.documentElement.style.setProperty('--wa-border', '#e1e9eb');
            } else {
                document.documentElement.style.setProperty('--wa-bg', '#0b141a');
                document.documentElement.style.setProperty('--wa-panel-bg', '#111b21');
                document.documentElement.style.setProperty('--wa-header-bg', '#202c33');
                document.documentElement.style.setProperty('--wa-text-main', '#e9edef');
                document.documentElement.style.setProperty('--wa-text-sub', '#8696a0');
                document.documentElement.style.setProperty('--wa-input-bg', '#2a3942');
                document.documentElement.style.setProperty('--wa-border', '#222e35');
            }
        }

        // تغيير حجم الخط
        function changeFontSize() {
            let size = document.getElementById('font-size-select').value;
            localStorage.setItem('appFontSize', size);
            document.documentElement.style.setProperty('--font-size-base', size);
        }

        // تحميل الإعدادات عند الفتح
        function loadSettings() {
            let savedTheme = localStorage.getItem('appTheme') || 'dark';
            let savedSize = localStorage.getItem('appFontSize') || '16px';
            
            document.getElementById('theme-select').value = savedTheme;
            document.getElementById('font-size-select').value = savedSize;
            
            applyTheme(savedTheme);
            document.documentElement.style.setProperty('--font-size-base', savedSize);
        }
    </script>
</body>
</html>
