<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-panel-bg: #111b21;
            --wa-header-bg: #202c33;
            --wa-text-main: #e9edef;
            --wa-text-sub: #8696a0;
            --wa-green: #00a884;
            --wa-input-bg: #202c33;
            --wa-border: #222e35;
            --font-size-base: 16px;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0c1317;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--wa-text-main);
            font-size: var(--font-size-base);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية التطبيق الكبيرة المضمونة */
        .app-window {
            display: flex;
            width: 100%;
            height: 100%;
            background-color: var(--wa-panel-bg);
            overflow: hidden;
        }

        /* ----------------------------------------- */
        /* الجانب الأيمن: القائمة الجانبية (الشات والبحث) */
        /* ----------------------------------------- */
        .side-panel {
            width: 35%;
            min-width: 300px;
            max-width: 400px;
            border-left: 1px solid var(--wa-border);
            display: flex;
            flex-direction: column;
            background-color: var(--wa-panel-bg);
            height: 100%;
        }

        .side-header {
            background-color: var(--wa-header-bg);
            height: 60px;
            min-height: 60px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background-color: #005c4b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #fff;
        }

        .header-icons button {
            background: none;
            border: none;
            color: var(--wa-text-sub);
            font-size: 1.2em;
            cursor: pointer;
            outline: none;
        }

        .search-container {
            padding: 8px 12px;
            background-color: var(--wa-panel-bg);
            border-bottom: 1px solid var(--wa-border);
        }

        .search-box {
            background-color: var(--wa-input-bg);
            border-radius: 8px;
            padding: 6px 12px;
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--wa-text-main);
            width: 100%;
            outline: none;
            font-size: 0.9em;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(34, 46, 53, 0.4);
        }

        .chat-item:hover, .chat-item.active {
            background-color: var(--wa-header-bg);
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #51595e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1em;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }

        .chat-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title-row h3 {
            margin: 0;
            font-size: 0.95em;
            font-weight: normal;
        }

        .chat-time {
            font-size: 0.75em;
            color: var(--wa-text-sub);
        }

        .chat-preview {
            font-size: 0.85em;
            color: var(--wa-text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ----------------------------------------- */
        /* الجانب الأيسر الكبيير: مساحة العرض الرئيسية */
        /* ----------------------------------------- */
        .main-view {
            flex: 1;
            background-color: #222e35;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 100%;
        }

        .welcome-screen {
            text-align: center;
            max-width: 460px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .welcome-logo {
            font-size: 5em;
            margin-bottom: 15px;
        }

        .welcome-screen h1 {
            font-size: 1.8em;
            font-weight: 300;
            margin: 10px 0;
        }

        .welcome-screen p {
            font-size: 0.9em;
            color: var(--wa-text-sub);
            line-height: 1.6;
            margin: 10px 0;
        }

        .settings-screen {
            width: 100%;
            height: 100%;
            background-color: #1f2c34;
            display: none;
            flex-direction: column;
        }

        .settings-header {
            background-color: var(--wa-header-bg);
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .back-arrow {
            background: none;
            border: none;
            color: var(--wa-text-main);
            font-size: 1.4em;
            cursor: pointer;
            outline: none;
        }

        .settings-body {
            flex: 1;
            padding: 25px 30px;
            overflow-y: auto;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-group label {
            display: block;
            color: var(--wa-green);
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: var(--wa-panel-bg);
            color: var(--wa-text-main);
            border: 1px solid var(--wa-border);
            border-radius: 6px;
            font-size: 1em;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-window">
        
        <div class="side-panel">
            <div class="side-header">
                <div class="user-avatar">ع</div>
                <div class="header-icons">
                    <button onclick="showSettingsPage()" title="الإعدادات">⚙️</button>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" placeholder="البحث أو بدء دردشة جديدة" disabled>
                </div>
            </div>

            <div class="chat-list">
                <div class="chat-item active" id="item-welcome" onclick="showWelcomePage()">
                    <div class="chat-avatar" style="background-color: #00a884;">💻</div>
                    <div class="chat-info">
                        <div class="chat-title-row">
                            <h3>واتساب ويب</h3>
                            <span class="chat-time">الآن</span>
                        </div>
                        <span class="chat-preview">البرنامج شغال رسمي 100%...</span>
                    </div>
                </div>

                <div class="chat-item" id="item-settings" onclick="showSettingsPage()">
                    <div class="chat-avatar" style="background-color: #202c33;">⚙️</div>
                    <div class="chat-info">
                        <div class="chat-title-row">
                            <h3>إعدادات المظهر والخط</h3>
                            <span class="chat-time">١٢:٠٠ م</span>
                        </div>
                        <span class="chat-preview">اضغط لتعديل الألوان والخطوط...</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-view" id="main-view-bg">
            
            <div class="welcome-screen" id="welcome-view">
                <div class="welcome-logo">📱</div>
                <h1>واتساب للكمبيوتر</h1>
                <p>أرسل واستقبل الرسائل دون الحاجة لإبقاء هاتفك متصلاً بالإنترنت.</p>
                <p style="color: var(--wa-text-sub); font-size: 0.8em; margin-top: 30px;">🔒 مشفر بين الطرفين</p>
            </div>

            <div class="settings-screen" id="settings-view">
                <div class="settings-header">
                    <button class="back-arrow" onclick="showWelcomePage()">➔</button>
                    <span>الإعدادات</span>
                </div>
                <div class="settings-body">
                    <div class="settings-group">
                        <label>المظهر المفضل (Theme):</label>
                        <select id="theme-select" onchange="changeTheme()">
                            <option value="dark">الوضع الداكن (WhatsApp Dark)</option>
                            <option value="light">الوضع الفاتح (WhatsApp Light)</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>حجم الخط (Font Size):</label>
                        <select id="font-size-select" onchange="changeFontSize()">
                            <option value="16px">افتراضي (متوسط)</option>
                            <option value="14px">صغير</option>
                            <option value="19px">كبير</option>
                            <option value="22px">كبير جداً</option>
                        </select>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        function showSettingsPage() {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'flex';
            document.getElementById('item-welcome').classList.remove('active');
            document.getElementById('item-settings').classList.add('active');
        }

        function showWelcomePage() {
            document.getElementById('settings-view').style.display = 'none';
            document.getElementById('welcome-view').style.display = 'flex';
            document.getElementById('item-settings').classList.remove('active');
            document.getElementById('item-welcome').classList.add('active');
        }

        function changeTheme() {
            let theme = document.getElementById('theme-select').value;
            localStorage.setItem('appTheme', theme);
            applyTheme(theme);
        }

        function applyTheme(theme) {
            let mainBg = document.getElementById('main-view-bg');
            if (theme === 'light') {
                document.documentElement.style.setProperty('--wa-bg', '#eae6df');
                document.documentElement.style.setProperty('--wa-panel-bg', '#ffffff');
                document.documentElement.style.setProperty('--wa-header-bg', '#f0f2f5');
                document.documentElement.style.setProperty('--wa-text-main', '#111b21');
                document.documentElement.style.setProperty('--wa-text-sub', '#667781');
                document.documentElement.style.setProperty('--wa-input-bg', '#f0f2f5');
                document.documentElement.style.setProperty('--wa-border', '#e1e9eb');
                if(mainBg) mainBg.style.backgroundColor = '#f8f9fa';
            } else {
                document.documentElement.style.setProperty('--wa-bg', '#0b141a');
                document.documentElement.style.setProperty('--wa-panel-bg', '#111b21');
                document.documentElement.style.setProperty('--wa-header-bg', '#202c33');
                document.documentElement.style.setProperty('--wa-text-main', '#e9edef');
                document.documentElement.style.setProperty('--wa-text-sub', '#8696a0');
                document.documentElement.style.setProperty('--wa-input-bg', '#202c33');
                document.documentElement.style.setProperty('--wa-border', '#222e35');
                if(mainBg) mainBg.style.backgroundColor = '#222e35';
            }
        }

        function changeFontSize() {
            let size = document.getElementById('font-size-select').value;
            localStorage.setItem('appFontSize', size);
            document.documentElement.style.setProperty('--font-size-base', size);
        }

        window.onload = function() {
            let savedTheme = localStorage.getItem('appTheme') || 'dark';
            let savedSize = localStorage.getItem('appFontSize') || '16px';
            
            document.getElementById('theme-select').value = savedTheme;
            document.getElementById('font-size-select').value = savedSize;
            
            applyTheme(savedTheme);
            document.documentElement.style.setProperty('--font-size-base', savedSize);
        }
    </script>
</body>
</html>
